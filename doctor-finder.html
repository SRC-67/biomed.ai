      :root {
        --primary-color: #008080;
        --primary-dark: #006666;
        --accent-mint: #f5fffa;
        --white: #ffffff;
        --text-main: #1a2b33;
        --text-muted: #5a717a;
        --bg-gradient: linear-gradient(135deg, #f5fffa 0%, #d8f0ea 100%);
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(255, 255, 255, 0.5);
        --glass-shadow: 0 8px 32px 0 rgba(0, 128, 128, 0.08);
        --transition-smooth: all 0.4s ease-in-out;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "Poppins", sans-serif;
        color: var(--text-main);
        background: var(--bg-gradient);
        background-attachment: fixed;
        line-height: 1.6;
        overflow-x: hidden;
      }

      a {
        text-decoration: none;
        color: inherit;
      }
      ul {
        list-style: none;
      }
      .container {
        width: 90%;
        max-width: 1200px;
        margin: 0 auto;
      }
      .text-center {
        text-align: center;
      }
      .text-primary {
        color: var(--primary-color) !important;
      }
      .text-muted {
        color: var(--text-muted);
      }
      .btn-primary,
      .btn-outline {
        padding: 0.7rem 1.5rem;
        border-radius: 50px;
        font-weight: 600;
        font-family: "Poppins", sans-serif;
        cursor: pointer;
        transition: var(--transition-smooth);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-primary {
        background: var(--primary-color);
        color: var(--white);
        border: none;
      }
      .btn-primary:hover {
        background: var(--primary-dark);
        transform: translateY(-3px);
      }
      .btn-outline {
        background: transparent;
        border: 2px solid var(--primary-color);
        color: var(--primary-color);
      }
      .btn-outline:hover {
        background: var(--primary-color);
        color: var(--white);
      }

      /* --- Navbar Styling --- */
      .navbar {
        padding: 1rem 0;
        position: sticky;
        top: 0;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--glass-border);
        box-shadow: var(--glass-shadow);
      }
      .nav-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logo a {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        font-size: 1.5rem;
        font-weight: 800;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 2rem;
      }
      .nav-links li a {
        font-weight: 500;
        position: relative;
        padding-bottom: 5px;
      }
      .nav-links li a::after {
        content: "";
        position: absolute;
        width: 0;
        height: 2px;
        bottom: 0;
        left: 0;
        background-color: var(--primary-color);
        transition: var(--transition-smooth);
      }
      .nav-links li a:hover::after {
        width: 100%;
      }
      .mobile-menu-btn {
        display: none;
        background: transparent;
        border: none;
        font-size: 1.8rem;
        color: var(--primary-color);
        cursor: pointer;
      }

      /* --- Filter Section --- */
      .filter-section {
        padding: 8rem 0 3rem;
        text-align: center;
      }
      .filter-section h1 {
        font-size: 2.5rem;
        margin-bottom: 1rem;
      }
      .filter-select {
        padding: 1rem 2rem;
        font-size: 1.1rem;
        border-radius: 50px;
        border: 2px solid var(--primary-color);
        background: var(--glass-bg);
        color: var(--text-main);
        font-family: "Poppins", sans-serif;
        outline: none;
        cursor: pointer;
        width: 100%;
        max-width: 400px;
        box-shadow: var(--glass-shadow);
        transition: var(--transition-smooth);
      }
      .filter-select:focus {
        box-shadow: 0 0 15px rgba(0, 128, 128, 0.2);
      }

      /* --- Doctor Grid --- */
      .doctor-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 2rem;
        padding-bottom: 5rem;
      }
      .doctor-card {
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        padding: 2rem;
        text-align: center;
        box-shadow: var(--glass-shadow);
        transition: var(--transition-smooth);
        display: flex;
        flex-direction: column;
        align-items: center;
        opacity: 0;
        transform: translateY(20px);
        animation: fadeIn 0.6s forwards;
      }
      .doctor-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 35px rgba(0, 128, 128, 0.15);
        border-color: var(--primary-color);
      }
      .doc-icon {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: rgba(0, 128, 128, 0.1);
        color: var(--primary-color);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        margin-bottom: 1rem;
      }
      .doc-name {
        font-size: 1.3rem;
        margin-bottom: 0.5rem;
      }
      .doc-specialty {
        font-size: 1rem;
        font-weight: 600;
        color: var(--primary-color);
        margin-bottom: 1.5rem;
      }

      /* --- Modal Styling --- */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 0;
        pointer-events: none;
        transition: var(--transition-smooth);
      }
      .modal-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }
      .modal-content {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 3rem 2rem;
        width: 90%;
        max-width: 500px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        transform: scale(0.8);
        transition: var(--transition-smooth);
        position: relative;
      }
      .modal-overlay.active .modal-content {
        transform: scale(1);
      }
      .close-modal {
        position: absolute;
        top: 15px;
        right: 20px;
        font-size: 1.8rem;
        cursor: pointer;
        color: var(--text-muted);
        transition: 0.3s;
      }
      .close-modal:hover {
        color: var(--danger-color);
      }
      .modal-doc-name {
        font-size: 1.8rem;
        margin: 1rem 0 0.5rem;
      }
      .modal-doc-details {
        font-size: 1.1rem;
        color: var(--text-muted);
        margin-bottom: 0.5rem;
      }
      .btn-whatsapp {
        background: #25d366;
        color: white;
        border: none;
        width: 100%;
        margin-top: 1.5rem;
        font-size: 1.1rem;
        padding: 1rem;
      }
      .btn-whatsapp:hover {
        background: #1ebe57;
        transform: translateY(-3px);
      }

      /* Animations */
      @keyframes fadeIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* --- Mobile Responsiveness --- */
      @media screen and (max-width: 768px) {
        .filter-section {
          padding: 6rem 0 2rem;
        }

          font-size: 2rem;
        }
        .nav-links {

        }

        }

          top: 100%;
          left: 0;

          background: rgba(255, 255, 255, 0.98);
          flex-direction: column;
          padding: 2rem 0;
          box-shadow: 0 10px 20px rgba(0, 128, 128, 0.1);
        }
      }
    </style>

              const docId = parseInt(e.target.getAttribute("data-id"));
              const doc = doctors.find((d) => d.id === docId);

              if (doc) {
                mName.innerText = doc.name;
                mSpec.innerText = doc.specialty;
                mDeg.innerText = doc.degree;
                mExp.innerText = `Experience: ${doc.exp}`;
                mLoc.innerHTML = `<i class="fa-solid fa-location-dot"></i> ${doc.loc}`;

                currentDoctorName = doc.name; // Save for WA logic
                modal.classList.add("active");
              }
            });
          });
        }

        closeModal.addEventListener("click", () =>
          modal.classList.remove("active"),
        );
        modal.addEventListener("click", (e) => {
          if (e.target === modal) modal.classList.remove("active"); // Click outside to close
        });

        // WhatsApp Button Logic
        waBtn.addEventListener("click", () => {
          // Fetch User Data from Intro Page (if it exists)
          const savedData = localStorage.getItem("medilinkUser");
          let uName = "Patient";
          let uProb = "a medical condition";

          if (savedData) {
            const parsed = JSON.parse(savedData);
            if (parsed.name) uName = parsed.name;
            if (parsed.problem) uProb = parsed.problem;
          }

          // WhatsApp Number provided by user
          const waNumber = "8801811389672";

          // Exact Format requested
          const message = `Hello Doctor ${currentDoctorName}, I am ${uName}. My problem is: ${uProb}. Please help.`;

          // Create the encoded URL
          const waURL = `https://wa.me/${waNumber}?text=${encodeURIComponent(message)}`;

          // Open WhatsApp in new tab
          window.open(waURL, "_blank");
        });

        // =====================================
        // 5. RESPONSIVE MENU & TRANSLATION
        // =====================================
        const mobileBtn = document.getElementById("mobile-menu-btn");
        const navLinks = document.querySelector(".nav-links");

        mobileBtn.addEventListener("click", () => {
          navLinks.classList.toggle("active");
          const icon = mobileBtn.querySelector("i");
          if (navLinks.classList.contains("active")) {
            icon.classList.replace("fa-bars", "fa-xmark");
          } else {
            icon.classList.replace("fa-xmark", "fa-bars");
          }
        });

        // Translation Logic
        const langBtn = document.getElementById("lang-toggle-btn");

        function applyLanguage(lang) {
          const elements = document.querySelectorAll("[data-bn]");
          if (lang === "bn") {
            elements.forEach((el) => {
              if (!el.hasAttribute("data-en"))
                el.setAttribute("data-en", el.innerText);
              el.innerText = el.getAttribute("data-bn");
            });
            if (langBtn)
              langBtn.innerHTML = `<i class="fa-solid fa-language"></i> English`;
          } else {
            elements.forEach((el) => {
              if (el.hasAttribute("data-en"))
                el.innerText = el.getAttribute("data-en");
            });
            if (langBtn)
              langBtn.innerHTML = `<i class="fa-solid fa-language"></i> বাংলা`;
          }
        }

        if (langBtn) {
          langBtn.addEventListener("click", () => {
            const currentLang =
              localStorage.getItem("medilinkLang") === "bn" ? "en" : "bn";
            localStorage.setItem("medilinkLang", currentLang);
            applyLanguage(currentLang);

            // Force update dropdown translation trick
            if (currentLang === "bn") {
              filterSelect.options[0].text = "সকল বিশেষজ্ঞ";
            } else {
              filterSelect.options[0].text = "All Specialties";
            }
          });
        }
      });
    </script>
  </body>
</html>
